name: Update agroclimate stats

on:
  schedule:
    - cron: "17 * * * *" # hourly, offset from :00 to avoid GitHub's peak-load queueing delays
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest stats
        env:
          AGROCLIMATE_DB_URL: ${{ secrets.AGROCLIMATE_DB_URL }}
        run: node scripts/fetch-agroclimate-stats.mjs

      - name: Commit updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/agroclimate-stats.json
          git diff --cached --quiet || git commit -m "chore: update agroclimate stats"
          git push
